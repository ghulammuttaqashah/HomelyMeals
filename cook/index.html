<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/cook.png" id="favicon" />
    <link rel="apple-touch-icon" href="/cook.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/cook.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/cook.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/cook.png" />
    <script>
      (function() {
        var img = new Image();
        img.onload = function() {
          var c = document.createElement('canvas');
          c.width = img.width; c.height = img.height;
          var ctx = c.getContext('2d');
          ctx.drawImage(img, 0, 0);
          ctx.globalCompositeOperation = 'source-atop';
          ctx.fillStyle = '#ea580c';
          ctx.fillRect(0, 0, c.width, c.height);
          var link = document.getElementById('favicon');
          if (link) link.href = c.toDataURL('image/png');
        };
        img.src = '/cook.png';
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ea580c" />
    <meta name="description" content="Manage your home kitchen business with Homely Meals" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HM Cook" />
    
    <!-- PWA Splash Screens -->
    <link rel="apple-touch-startup-image" href="/cook.png" />
    
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
    <title>Homely Meals - Cook</title>
  </head>
  <body>
    <!-- Capture beforeinstallprompt BEFORE React loads so it's never lost on reload -->
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
