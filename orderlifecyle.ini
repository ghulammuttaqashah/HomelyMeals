│                     AUTOMATED JOBS (CRON)                                │
├─────────────────────────────────────────────────────────────────────────┤
│                                                                          │
│  • Every minute: Expire PENDING orders older than 5 minutes             │
│  • Every minute: Cancel CONFIRMED orders with no payment after 10 min   │
│  • Every minute: Remind customer to confirm delivery after 15 min       │
