│                                                                          │
│  Status              │ Customer Can Cancel │ Cook Can Cancel            │
│  ────────────────────┼─────────────────────┼────────────────────────    │
│  PENDING             │ ✅ Yes              │ ✅ Reject                  │
│  CONFIRMED           │ ✅ Yes              │ ✅ With reason             │
│  PREPARING           │ ❌ No               │ ✅ With reason             │
│  OUT_FOR_DELIVERY    │ ❌ No               │ ✅ With reason             │
│  DELIVERY_PENDING    │ ❌ No               │ ❌ No                      │
